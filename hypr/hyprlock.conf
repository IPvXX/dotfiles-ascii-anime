# ===========================
# Minimal Black & White Theme
# ===========================

general {
    disable_loading_bar = false
    hide_cursor = true
    grace = 0
}

background {
    monitor =
    color = rgb(000000)
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgb(FFFFFF)
    font_size = 96
    font_family = JetBrains Mono Nerd Font
    position = 0, 120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d %B %Y")"
    color = rgb(BBBBBB)
    font_size = 24
    font_family = JetBrains Mono Nerd Font
    position = 0, 40
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 320, 60
    position = 0, -120
    halign = center
    valign = center

    outer_color = rgb(FFFFFF)
    inner_color = rgb(000000)
    check_color = rgb(FFFFFF)
    fail_color = rgb(FF4444)
    font_color = rgb(FFFFFF)

    font_family = Inter
    font_size = 20

    fade_on_empty = false
    placeholder_text = Password
    rounding = 8
    dots_center = true
}

label {
    monitor =
    text = Esc
    color = rgb(777777)
    font_size = 18
    font_family = JetBrains Mono Nerd Font
    position = 0, -200
    halign = center
    valign = center
}
label {
    monitor =
    text = ⏻ Super + Delete · Shutdown
    color = rgb(777777)
    font_size = 18
    font_family = JetBrains Mono Nerd Font

    halign = center
    valign = bottom
    position = 0, 20
}